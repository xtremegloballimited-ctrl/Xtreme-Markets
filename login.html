<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — Xtreme Markets</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green:  #7dc74b;
      --green2: #5faa2e;
      --dark:   #0d1117;
      --dark2:  #151b24;
      --dark3:  #1c2535;
      --border: rgba(255,255,255,0.08);
      --text:   #ffffff;
      --muted:  #8a95a3;
      --card:   #161d2b;
      --error:  #ff4d4d;
    }
    html, body { height: 100%; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--dark); color: var(--text);
      display: flex; flex-direction: column; min-height: 100vh;
    }
    a { text-decoration: none; color: inherit; }

    /* ── TOP BAR ── */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; height: 64px;
      border-bottom: 1px solid var(--border);
      background: rgba(13,17,23,0.95);
      backdrop-filter: blur(12px);
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    }
    .logo {
      display: flex; align-items: center; gap: 10px;
      font-size: 20px; font-weight: 800; letter-spacing: -0.5px;
    }
    .logo svg { width: 30px; height: 30px; }
    .logo span { color: var(--green); }
    .topbar-right { font-size: 13.5px; color: var(--muted); }
    .topbar-right a { color: var(--green); font-weight: 600; }

    /* ── MAIN ── */
    main {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 100px 24px 48px;
      background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(125,199,75,0.07) 0%, transparent 65%);
    }

    .auth-card {
      width: 100%; max-width: 440px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 20px; padding: 40px 36px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.4);
    }
    .auth-card h1 { font-size: 26px; font-weight: 800; margin-bottom: 6px; }
    .auth-card .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 32px; }

    /* Social */
    .social-row { display: flex; gap: 10px; margin-bottom: 24px; }
    .social-btn {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 11px; border-radius: 10px; font-size: 13.5px; font-weight: 600;
      background: var(--dark3); border: 1px solid var(--border);
      color: var(--text); cursor: pointer; transition: border-color 0.18s, background 0.18s;
    }
    .social-btn:hover { border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.04); }
    .social-btn svg { width: 18px; height: 18px; flex-shrink: 0; }

    .divider {
      display: flex; align-items: center; gap: 12px;
      color: var(--muted); font-size: 12px; margin-bottom: 24px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    /* Form */
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 7px; }
    .input-wrap { position: relative; }
    .input-wrap input {
      width: 100%; padding: 12px 44px 12px 14px;
      background: var(--dark3); border: 1px solid var(--border);
      border-radius: 10px; font-size: 14px; color: var(--text);
      outline: none; transition: border-color 0.18s;
    }
    .input-wrap input:focus { border-color: var(--green); }
    .input-wrap input::placeholder { color: var(--muted); }
    .input-wrap .toggle-pw {
      position: absolute; right: 13px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: var(--muted);
      display: flex; align-items: center;
      transition: color 0.15s;
    }
    .input-wrap .toggle-pw:hover { color: var(--text); }

    .form-footer {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px;
    }
    .remember { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); cursor: pointer; }
    .remember input[type=checkbox] { accent-color: var(--green); width: 15px; height: 15px; }
    .forgot { font-size: 13px; color: var(--green); font-weight: 600; }
    .forgot:hover { text-decoration: underline; }

    /* Error */
    .error-msg {
      display: none; background: rgba(255,77,77,0.1); border: 1px solid rgba(255,77,77,0.3);
      border-radius: 8px; padding: 10px 14px; font-size: 13px; color: var(--error);
      margin-bottom: 18px;
    }
    .error-msg.show { display: block; }

    .btn-submit {
      width: 100%; padding: 14px; border-radius: 10px;
      background: var(--green); color: #fff; font-size: 15px; font-weight: 700;
      border: none; cursor: pointer; transition: background 0.18s, transform 0.1s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-submit:hover { background: var(--green2); }
    .btn-submit:active { transform: scale(0.98); }
    .btn-submit.loading { pointer-events: none; opacity: 0.7; }
    .btn-submit .spinner {
      width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite;
      display: none;
    }
    .btn-submit.loading .spinner { display: block; }
    .btn-submit.loading .btn-label { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .switch-link { text-align: center; margin-top: 24px; font-size: 13.5px; color: var(--muted); }
    .switch-link a { color: var(--green); font-weight: 700; }
    .switch-link a:hover { text-decoration: underline; }

    /* ── FOOTER ── */
    footer {
      text-align: center; padding: 20px 24px;
      font-size: 12px; color: var(--muted);
      border-top: 1px solid var(--border);
    }
    footer a { color: var(--muted); }
    footer a:hover { color: var(--green); }
  </style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="logo">
    <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="32" height="32" rx="8" fill="#7dc74b"/>
      <path d="M6 22 L11 14 L16 18 L21 10 L26 16" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </svg>
    Xtreme<span>Markets</span>
  </a>
  <div class="topbar-right">Don't have an account? <a href="register.html">Sign Up</a></div>
</div>

<main>
  <div class="auth-card">
    <h1>Welcome back</h1>
    <p class="subtitle">Log in to your Xtreme Markets account</p>

    <div class="social-row">
      <button class="social-btn" id="googleBtn">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Google
      </button>
      <button class="social-btn" id="appleBtn">
        <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.7 9.05 7.37c1.33.07 2.25.75 3.01.8 1.12-.22 2.19-.94 3.39-.84 1.44.12 2.53.72 3.26 1.83-3.01 1.82-2.38 5.79.61 6.94-.61 1.57-1.41 3.12-2.27 4.18zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
        </svg>
        Apple
      </button>
    </div>

    <div class="divider">or continue with email</div>

    <div id="errMsg" class="error-msg"></div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="email">Email address</label>
        <div class="input-wrap">
          <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrap">
          <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required>
          <button type="button" class="toggle-pw" id="togglePw" aria-label="Toggle password">
            <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="form-footer">
        <label class="remember">
          <input type="checkbox" id="rememberMe"> Remember me
        </label>
        <a href="forgot-password.html" class="forgot">Forgot password?</a>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">
        <span class="spinner"></span>
        <span class="btn-label">Log In</span>
      </button>
    </form>

    <div class="switch-link">
      New to Xtreme Markets? <a href="register.html">Create an account</a>
    </div>
  </div>
</main>

<footer>
  &copy; 2024 Xtreme Markets &nbsp;·&nbsp;
  <a href="privacy.html">Privacy Policy</a> &nbsp;·&nbsp;
  <a href="terms.html">Terms of Service</a>
</footer>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  const _SB_URL  = 'https://kcaghkzkerchsugampkn.supabase.co';
  const _SB_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtjYWdoa3prZXJjaHN1Z2FtcGtuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMjI5MTQsImV4cCI6MjA5NzY5ODkxNH0.gtmnSl_u9jLrr5ApiAWf2Qok-1twGyDnxIyuyzChuEc';
  const db = supabase.createClient(_SB_URL, _SB_KEY);

  // Toggle password visibility
  const pwInput  = document.getElementById('password');
  const togglePw = document.getElementById('togglePw');
  const eyeIcon  = document.getElementById('eyeIcon');
  togglePw.addEventListener('click', () => {
    const show = pwInput.type === 'password';
    pwInput.type = show ? 'text' : 'password';
    eyeIcon.innerHTML = show
      ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`
      : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  });

  function showErr(msg) {
    const el = document.getElementById('errMsg');
    el.textContent = msg;
    el.classList.add('show');
  }
  function hideErr() { document.getElementById('errMsg').classList.remove('show'); }

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    hideErr();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email || !password) { showErr('Please fill in all fields.'); return; }

    const btn = document.getElementById('submitBtn');
    btn.classList.add('loading');

    const { data, error } = await db.auth.signInWithPassword({ email, password });
    if (error) {
      btn.classList.remove('loading');
      showErr(error.message || 'Login failed. Please check your credentials.');
      return;
    }

    // Redirect to dashboard
    window.location.href = 'dashboard.html';
  });

  // Google OAuth
  document.getElementById('googleBtn').addEventListener('click', async () => {
    await db.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin + '/dashboard.html' } });
  });

  // Apple OAuth
  document.getElementById('appleBtn').addEventListener('click', async () => {
    await db.auth.signInWithOAuth({ provider: 'apple', options: { redirectTo: window.location.origin + '/dashboard.html' } });
  });

  // If already logged in, redirect
  db.auth.getSession().then(({ data: { session } }) => {
    if (session) window.location.href = 'dashboard.html';
  });
</script>
</body>
</html>
