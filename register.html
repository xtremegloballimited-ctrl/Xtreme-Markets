<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — Xtreme Markets</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green:  #7dc74b;
      --green2: #5faa2e;
      --dark:   #0d1117;
      --dark2:  #151b24;
      --dark3:  #1c2535;
      --border: rgba(255,255,255,0.08);
      --text:   #ffffff;
      --muted:  #8a95a3;
      --card:   #161d2b;
      --error:  #ff4d4d;
    }
    html, body { height: 100%; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--dark); color: var(--text);
      display: flex; flex-direction: column; min-height: 100vh;
    }
    a { text-decoration: none; color: inherit; }

    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; height: 64px;
      border-bottom: 1px solid var(--border);
      background: rgba(13,17,23,0.95);
      backdrop-filter: blur(12px);
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    }
    .logo {
      display: flex; align-items: center; gap: 10px;
      font-size: 20px; font-weight: 800; letter-spacing: -0.5px;
    }
    .logo svg { width: 30px; height: 30px; }
    .logo span { color: var(--green); }
    .topbar-right { font-size: 13.5px; color: var(--muted); }
    .topbar-right a { color: var(--green); font-weight: 600; }

    main {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 100px 24px 48px;
      background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(125,199,75,0.07) 0%, transparent 65%);
    }

    .auth-card {
      width: 100%; max-width: 480px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 20px; padding: 40px 36px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.4);
    }
    .auth-card h1 { font-size: 26px; font-weight: 800; margin-bottom: 6px; }
    .auth-card .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 28px; }

    .social-row { display: flex; gap: 10px; margin-bottom: 24px; }
    .social-btn {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 11px; border-radius: 10px; font-size: 13.5px; font-weight: 600;
      background: var(--dark3); border: 1px solid var(--border);
      color: var(--text); cursor: pointer; transition: border-color 0.18s, background 0.18s;
    }
    .social-btn:hover { border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.04); }
    .social-btn svg { width: 18px; height: 18px; flex-shrink: 0; }

    .divider {
      display: flex; align-items: center; gap: 12px;
      color: var(--muted); font-size: 12px; margin-bottom: 24px;
    }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 7px; }
    .input-wrap { position: relative; }
    .input-wrap input, .input-wrap select {
      width: 100%; padding: 12px 44px 12px 14px;
      background: var(--dark3); border: 1px solid var(--border);
      border-radius: 10px; font-size: 14px; color: var(--text);
      outline: none; transition: border-color 0.18s; appearance: none;
    }
    .input-wrap select { padding-right: 36px; cursor: pointer; }
    .input-wrap select option { background: var(--dark2); }
    .input-wrap input:focus, .input-wrap select:focus { border-color: var(--green); }
    .input-wrap input::placeholder { color: var(--muted); }
    .input-wrap .toggle-pw {
      position: absolute; right: 13px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: var(--muted);
      display: flex; align-items: center; transition: color 0.15s;
    }
    .input-wrap .toggle-pw:hover { color: var(--text); }
    .input-wrap .sel-arrow {
      position: absolute; right: 13px; top: 50%; transform: translateY(-50%);
      pointer-events: none; color: var(--muted);
    }

    /* Password strength */
    .pw-strength { margin-top: 8px; }
    .pw-bars { display: flex; gap: 4px; margin-bottom: 4px; }
    .pw-bar { flex: 1; height: 3px; border-radius: 2px; background: var(--dark3); transition: background 0.25s; }
    .pw-bar.weak   { background: #ff4d4d; }
    .pw-bar.fair   { background: #ffa500; }
    .pw-bar.good   { background: #7dc74b; }
    .pw-bar.strong { background: #00d084; }
    .pw-label { font-size: 11px; color: var(--muted); }

    /* Country phone prefix */
    .phone-wrap { display: flex; gap: 0; }
    .phone-prefix {
      padding: 12px 10px; background: var(--dark3); border: 1px solid var(--border);
      border-right: none; border-radius: 10px 0 0 10px; font-size: 13px; color: var(--muted);
      white-space: nowrap; display: flex; align-items: center;
    }
    .phone-wrap input {
      border-radius: 0 10px 10px 0 !important;
      padding-left: 10px !important;
    }

    .terms-row {
      display: flex; align-items: flex-start; gap: 10px;
      margin-bottom: 20px; font-size: 13px; color: var(--muted); line-height: 1.5;
    }
    .terms-row input[type=checkbox] { accent-color: var(--green); width: 15px; height: 15px; margin-top: 2px; flex-shrink: 0; cursor: pointer; }
    .terms-row a { color: var(--green); }
    .terms-row a:hover { text-decoration: underline; }

    .error-msg {
      display: none; background: rgba(255,77,77,0.1); border: 1px solid rgba(255,77,77,0.3);
      border-radius: 8px; padding: 10px 14px; font-size: 13px; color: var(--error);
      margin-bottom: 16px;
    }
    .error-msg.show { display: block; }

    .success-msg {
      display: none; background: rgba(125,199,75,0.1); border: 1px solid rgba(125,199,75,0.3);
      border-radius: 8px; padding: 10px 14px; font-size: 13px; color: var(--green);
      margin-bottom: 16px;
    }
    .success-msg.show { display: block; }

    .btn-submit {
      width: 100%; padding: 14px; border-radius: 10px;
      background: var(--green); color: #fff; font-size: 15px; font-weight: 700;
      border: none; cursor: pointer; transition: background 0.18s, transform 0.1s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-submit:hover { background: var(--green2); }
    .btn-submit:active { transform: scale(0.98); }
    .btn-submit.loading { pointer-events: none; opacity: 0.7; }
    .btn-submit .spinner {
      width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite;
      display: none;
    }
    .btn-submit.loading .spinner { display: block; }
    .btn-submit.loading .btn-label { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .switch-link { text-align: center; margin-top: 24px; font-size: 13.5px; color: var(--muted); }
    .switch-link a { color: var(--green); font-weight: 700; }
    .switch-link a:hover { text-decoration: underline; }

    footer {
      text-align: center; padding: 20px 24px;
      font-size: 12px; color: var(--muted);
      border-top: 1px solid var(--border);
    }
    footer a { color: var(--muted); }
    footer a:hover { color: var(--green); }

    @media (max-width: 500px) {
      .auth-card { padding: 28px 20px; }
      .form-row { grid-template-columns: 1fr; gap: 0; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="logo">
    <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="32" height="32" rx="8" fill="#7dc74b"/>
      <path d="M6 22 L11 14 L16 18 L21 10 L26 16" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </svg>
    Xtreme<span>Markets</span>
  </a>
  <div class="topbar-right">Already have an account? <a href="login.html">Log In</a></div>
</div>

<main>
  <div class="auth-card">
    <h1>Create account</h1>
    <p class="subtitle">Start trading with Xtreme Markets today</p>

    <div class="social-row">
      <button class="social-btn" id="googleBtn">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Google
      </button>
      <button class="social-btn" id="appleBtn">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.7 9.05 7.37c1.33.07 2.25.75 3.01.8 1.12-.22 2.19-.94 3.39-.84 1.44.12 2.53.72 3.26 1.83-3.01 1.82-2.38 5.79.61 6.94-.61 1.57-1.41 3.12-2.27 4.18zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
        </svg>
        Apple
      </button>
    </div>

    <div class="divider">or sign up with email</div>

    <div id="errMsg" class="error-msg"></div>
    <div id="successMsg" class="success-msg"></div>

    <form id="registerForm" novalidate>
      <div class="form-row">
        <div class="form-group">
          <label for="firstName">First name</label>
          <div class="input-wrap">
            <input type="text" id="firstName" placeholder="John" autocomplete="given-name" required>
          </div>
        </div>
        <div class="form-group">
          <label for="lastName">Last name</label>
          <div class="input-wrap">
            <input type="text" id="lastName" placeholder="Doe" autocomplete="family-name" required>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email address</label>
        <div class="input-wrap">
          <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required>
        </div>
      </div>

      <div class="form-group">
        <label for="phone">Phone number</label>
        <div class="phone-wrap">
          <div class="phone-prefix" id="phonePrefix">+1</div>
          <div class="input-wrap" style="flex:1">
            <input type="tel" id="phone" placeholder="(555) 000-0000" autocomplete="tel-national">
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="country">Country</label>
        <div class="input-wrap">
          <select id="country" required>
            <option value="">Select your country</option>
            <option value="US" data-prefix="+1">United States</option>
            <option value="GB" data-prefix="+44">United Kingdom</option>
            <option value="NG" data-prefix="+234">Nigeria</option>
            <option value="ZA" data-prefix="+27">South Africa</option>
            <option value="GH" data-prefix="+233">Ghana</option>
            <option value="KE" data-prefix="+254">Kenya</option>
            <option value="CA" data-prefix="+1">Canada</option>
            <option value="AU" data-prefix="+61">Australia</option>
            <option value="DE" data-prefix="+49">Germany</option>
            <option value="FR" data-prefix="+33">France</option>
            <option value="IN" data-prefix="+91">India</option>
            <option value="BR" data-prefix="+55">Brazil</option>
            <option value="MX" data-prefix="+52">Mexico</option>
            <option value="AE" data-prefix="+971">United Arab Emirates</option>
            <option value="SG" data-prefix="+65">Singapore</option>
            <option value="OTHER" data-prefix="+">Other</option>
          </select>
          <span class="sel-arrow">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </span>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrap">
          <input type="password" id="password" placeholder="Create a strong password" autocomplete="new-password" required>
          <button type="button" class="toggle-pw" id="togglePw" aria-label="Toggle password">
            <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <div class="pw-strength">
          <div class="pw-bars">
            <div class="pw-bar" id="bar1"></div>
            <div class="pw-bar" id="bar2"></div>
            <div class="pw-bar" id="bar3"></div>
            <div class="pw-bar" id="bar4"></div>
          </div>
          <div class="pw-label" id="pwLabel">Use 8+ characters with letters, numbers & symbols</div>
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPw">Confirm password</label>
        <div class="input-wrap">
          <input type="password" id="confirmPw" placeholder="Repeat your password" autocomplete="new-password" required>
        </div>
      </div>

      <div class="terms-row">
        <input type="checkbox" id="agreeTerms" required>
        <label for="agreeTerms">
          I agree to the <a href="terms.html" target="_blank">Terms of Service</a> and
          <a href="privacy.html" target="_blank">Privacy Policy</a>. I confirm I am 18 years or older.
        </label>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">
        <span class="spinner"></span>
        <span class="btn-label">Create Account</span>
      </button>
    </form>

    <div class="switch-link">
      Already have an account? <a href="login.html">Log in</a>
    </div>
  </div>
</main>

<footer>
  &copy; 2024 Xtreme Markets &nbsp;·&nbsp;
  <a href="privacy.html">Privacy Policy</a> &nbsp;·&nbsp;
  <a href="terms.html">Terms of Service</a>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  const _SB_URL = 'https://kcaghkzkerchsugampkn.supabase.co';
  const _SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtjYWdoa3prZXJjaHN1Z2FtcGtuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMjI5MTQsImV4cCI6MjA5NzY5ODkxNH0.gtmnSl_u9jLrr5ApiAWf2Qok-1twGyDnxIyuyzChuEc';
  const db = supabase.createClient(_SB_URL, _SB_KEY);

  // Country → phone prefix
  document.getElementById('country').addEventListener('change', function() {
    const opt = this.options[this.selectedIndex];
    document.getElementById('phonePrefix').textContent = opt.dataset.prefix || '+';
  });

  // Password visibility toggle
  const pwInput  = document.getElementById('password');
  const togglePw = document.getElementById('togglePw');
  const eyeIcon  = document.getElementById('eyeIcon');
  togglePw.addEventListener('click', () => {
    const show = pwInput.type === 'password';
    pwInput.type = show ? 'text' : 'password';
    eyeIcon.innerHTML = show
      ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`
      : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  });

  // Password strength
  function getPwScore(pw) {
    let score = 0;
    if (pw.length >= 8) score++;
    if (pw.length >= 12) score++;
    if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
    if (/[0-9]/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;
    return Math.min(score, 4);
  }
  const barEls = [1,2,3,4].map(i => document.getElementById('bar' + i));
  const levels = ['', 'weak', 'fair', 'good', 'strong'];
  const labels = ['', 'Too weak', 'Fair', 'Good', 'Strong'];
  pwInput.addEventListener('input', () => {
    const score = getPwScore(pwInput.value);
    barEls.forEach((b, i) => {
      b.className = 'pw-bar' + (i < score ? ' ' + levels[score] : '');
    });
    document.getElementById('pwLabel').textContent = pwInput.value
      ? (labels[score] || 'Use 8+ characters with letters, numbers & symbols')
      : 'Use 8+ characters with letters, numbers & symbols';
  });

  function showErr(msg) {
    const el = document.getElementById('errMsg');
    el.textContent = msg; el.classList.add('show');
    document.getElementById('successMsg').classList.remove('show');
  }
  function showSuccess(msg) {
    const el = document.getElementById('successMsg');
    el.textContent = msg; el.classList.add('show');
    document.getElementById('errMsg').classList.remove('show');
  }
  function hideMsg() {
    document.getElementById('errMsg').classList.remove('show');
    document.getElementById('successMsg').classList.remove('show');
  }

  document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    hideMsg();

    const firstName = document.getElementById('firstName').value.trim();
    const lastName  = document.getElementById('lastName').value.trim();
    const email     = document.getElementById('email').value.trim();
    const phone     = document.getElementById('phone').value.trim();
    const country   = document.getElementById('country').value;
    const password  = document.getElementById('password').value;
    const confirmPw = document.getElementById('confirmPw').value;
    const agreed    = document.getElementById('agreeTerms').checked;
    const prefix    = document.getElementById('phonePrefix').textContent;

    if (!firstName || !lastName) { showErr('Please enter your full name.'); return; }
    if (!email) { showErr('Please enter your email address.'); return; }
    if (!country) { showErr('Please select your country.'); return; }
    if (!password || password.length < 8) { showErr('Password must be at least 8 characters.'); return; }
    if (password !== confirmPw) { showErr('Passwords do not match.'); return; }
    if (!agreed) { showErr('You must agree to the Terms of Service to continue.'); return; }

    const btn = document.getElementById('submitBtn');
    btn.classList.add('loading');

    const { data, error } = await db.auth.signUp({
      email,
      password,
      options: {
        data: {
          first_name: firstName,
          last_name:  lastName,
          phone:      phone ? prefix + phone : '',
          country,
        },
        emailRedirectTo: window.location.origin + '/login.html',
      }
    });

    btn.classList.remove('loading');

    if (error) {
      showErr(error.message || 'Registration failed. Please try again.');
      return;
    }

    // Insert profile row
    if (data?.user) {
      await db.from('profiles').upsert({
        id:         data.user.id,
        email,
        first_name: firstName,
        last_name:  lastName,
        phone:      phone ? prefix + phone : '',
        country,
        balance:    0,
        total_pnl:  0,
      }, { onConflict: 'id' });
    }

    showSuccess('Account created! Please check your email to verify your account, then log in.');
    document.getElementById('registerForm').reset();
    document.getElementById('phonePrefix').textContent = '+1';
  });

  // Google
  document.getElementById('googleBtn').addEventListener('click', async () => {
    await db.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin + '/dashboard.html' } });
  });

  // Apple
  document.getElementById('appleBtn').addEventListener('click', async () => {
    await db.auth.signInWithOAuth({ provider: 'apple', options: { redirectTo: window.location.origin + '/dashboard.html' } });
  });

  // Already logged in
  db.auth.getSession().then(({ data: { session } }) => {
    if (session) window.location.href = 'dashboard.html';
  });
</script>
</body>
</html>
